# --- CONFIGURACIÓN DEL SERVIDOR ---
server.port=8082
spring.application.name=ms-reservas

# --- CONEXIÓN ORACLE CLOUD (WALLET) ---
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver
spring.datasource.url=jdbc:oracle:thin:@ONLYFIELDS_HIGH?TNS_ADMIN=C:/Users/dolap/Wallet/Wallet_ONLYFIELDS
spring.datasource.username=OF_RESERVAS
spring.datasource.password=OnlyFields2026


# --- JPA / HIBERNATE ---
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.OracleDialect

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false


spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.user=${spring.datasource.username}
spring.flyway.password=${spring.datasource.password}
spring.flyway.url=${spring.datasource.url}

# --- LOGS ---
logging.level.org.hibernate=DEBUG
spring.docker.compose.enabled=false