server:
  port: 8086

spring:
  application:
    name: accesos

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://db-mysql:3306/ms_accesos_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: root


  docker:
    compose:
      enabled: false


  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect



  flyway:
    enabled: false



logging:
  level:
    org.hibernate: DEBUG
    com.zaxxer.hikari: DEBUG
    java.sql: DEBUG