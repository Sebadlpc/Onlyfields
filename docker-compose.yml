version: '3.8'

services:
  # Servicio 1: MySQL Database
  db-mysql:
    image: mysql:8.0
    container_name: onlyfields-db-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: usuarios_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - onlyfields-network
    healthcheck:

    
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Servicio 2: ms-usuarios (Spring Boot Native)
  
  ms-usuarios:
    build:
      context: .
      dockerfile: usuarios/Dockerfile 
    container_name: onlyfields-ms-usuarios
    ports:
      - "8081:8080"
    networks:
      - onlyfields-network
    depends_on:
      db-mysql:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db-mysql:3306/usuarios_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
# Redes y Volúmenes
networks:
  onlyfields-network:
    driver: bridge

volumes:
  mysql_data:
