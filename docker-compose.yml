services:
  db-mysql:
    image: mysql:8.0
    container_name: onlyfields-db-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: onlyfields_db
    ports:
      - "3306:3306"
    networks:
      - onlyfields-network
    restart: unless-stopped

  ms-usuarios:
    build:
      context: .
      dockerfile: usuarios/Dockerfile
    container_name: onlyfields-ms-usuarios
    ports:
      - "8081:8080"
    depends_on:
      - db-mysql
    networks:
      - onlyfields-network
    restart: unless-stopped

networks:
  onlyfields-network:
    driver: bridge